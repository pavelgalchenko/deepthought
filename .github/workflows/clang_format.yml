name: Clang Format Checker
on: [ push ]
jobs:
   clang-format-checking:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v5
         - name: Add Homebrew to Path
           run: eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
         - name: Set up Homebrew
           uses: Homebrew/actions/setup-homebrew@main
         - name: Install/Update clang-format
           run: HOMEBREW_NO_AUTO_UPDATE=1 brew install clang-format
         - name: Update PATH
           run: echo 'export PATH="/home/linuxbrew/.linuxbrew/opt/clang-format/bin:$PATH"'
              >> /home/runner/.bash_profile
         - name: Clang Format Github Action
           uses: RafikFarhad/clang-format-github-action@v6.0.1
           with:
              style: "file"
              sources: "Source/*.c,Include/*.h,Kit/Source/*/.c,Kit/Include/*.h"
         - run: echo "Formatted with clang-format version ${{
              steps.clang-format.outputs.clang-format-version }}"
