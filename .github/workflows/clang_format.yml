name: Clang Format Checker
on: [ push ]
jobs:
   clang-format-checking:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v5
         - name: Add Homebrew to Path
           run: eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
         - name: Install/Update clang-format
           run: brew install clang-format
         - name: Check with Brew's clang-format
           run: /home/linuxbrew/.linuxbrew/opt/clang-format/bin/clang-format Source/*.c
              Include/*.h Kit/Source/*/.c Kit/Include/*.h
         - run: echo "Formatted with clang-format version"
         - run: /home/linuxbrew/.linuxbrew/opt/clang-format/bin/clang-format --version
