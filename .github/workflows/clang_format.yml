name: Clang Format Checker
on: [ push ]
defaults:
   run:
      shell: bash
      working-directory: ./
jobs:
   clang-format-checking:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v5
         - name: Set up Homebrew
           uses: Homebrew/actions/setup-homebrew@main
         - name: Install/Update clang-format
           run: brew install clang-format
         - name: Add Brew's clang-format to the Path
           run: >
              echo 'export
              PATH="/home/linuxbrew/.linuxbrew/opt/clang-format/bin:$PATH"'/
                >> /home/runner/.bash_profile
         - name: Check formatting with clang-format-checking
           run: >
              clang-format Source/*.c Include/*.h Kit/Source/*.c Kit/Include/*.h
              --style=file --dry-run -Werror
         - run: echo "Formatted with $(clang-format --version)"
